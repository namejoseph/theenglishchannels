  <!-- Adobe Fonts (Balboa) -->
  <link rel="stylesheet" href="https://use.typekit.net/coy4inr.css">

  <!-- Font Awesome (social icons) -->

    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    html { min-height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    :root{
      --header-h: 84px;
      --footer-h: 84px;
      --pad: clamp(16px, 2.5vw, 28px);
      --fuschia: #c70864;
    }

    /* Page layout */
    body{
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header{
      height: var(--header-h);
      background: black;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 var(--pad);
    }

    .logo-cure{
      height: 40px;
      width: auto;
      display: block;
    }
    a:hover .logo-cure{
      content: url('../assets/images/logos/tec-cure-logo-hover.svg');
    }

    .header-socials{
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .header-socials a{
      color: #fff;
      font-size: 18px;
      text-decoration: none;
    }
    .header-socials a:hover{ color: var(--fuschia); }

    main{
      flex: 1;
      background: #111 url('../assets/images/backgrounds/tec-website-bg-cure.jpg') no-repeat center center / cover;
      color: #fff;
      padding: var(--pad);
    }

    /* Video Section */
    .section{
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 0;
    }

    .section h1{
      font-family: 'balboa-plus-fill', sans-serif;
      font-size: 56px;
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 32px;
    }

    .videos-grid{
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
    }

    .video-responsive{
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
    }
    .video-responsive iframe{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .videos-grid p{
      font-family: 'Futura', sans-serif;
      font-size: 17.6px;
      color: #fff;
      text-align: center;
      margin: 12px 0 24px;
    }

    /* Gallery Section */
    .section h2 {
      font-family: 'balboa-plus-fill', sans-serif;
      font-size: 2rem;
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      margin: 3rem 0 2rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .gallery-item {
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover {
      transform: scale(1.05);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 40px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
    }

    .close-btn:hover {
      color: var(--fuschia);
    }

    @media (max-width: 768px){
      .videos-grid{
        grid-template-columns: 1fr;
      }
      .section h1{
        font-size: 40px;
      }
      .section h2 {
        font-size: 1.5rem;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.5rem;
      }
      .close-btn {
        top: 10px;
        right: 20px;
        font-size: 30px;
      }
    }

    footer{
      background: url('../assets/images/backgrounds/tec-website-bg-cure-footer.jpg') center top / cover no-repeat;
      color: #fff;
      font-family: 'Futura', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem 2rem;
      gap: 0.25rem;
    }

    .footer-links{
      font-size: 11.52px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
      line-height: 1.6;
    }
    .footer-links a{
      color: #fff;
      text-decoration: none;
    }
    .footer-links a:hover{
      color: var(--fuschia);
    }

    .footer-copyright{
      font-size: 11.52px;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 0;
      line-height: 1.6;
    }

    /* Header content */
    .brand{
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      user-select: none;
    }

    /* Desktop nav */
    .nav-desktop{
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .nav-desktop a{
      color: #fff;
      text-decoration: none;
      font-family: 'balboa-plus-fill', sans-serif;
      font-size: 19px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-desktop a:hover{ color: var(--fuschia); }

    /* Hamburger / X button (no border) */
    .menu-btn{
      width: 56px;
      height: 56px;
      display: none; /* mobile only */
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      position: relative;
      padding: 0;
    }
    .menu-btn:focus-visible{
      outline: 2px solid #fff;
      outline-offset: 4px;
    }

    .icon-bars{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }
    .icon-bars span{
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 220ms ease;
      position: absolute;
      transform-origin: center;
    }
    .icon-bars span:nth-child(1){ transform: translateY(-8px); }
    .icon-bars span:nth-child(2){ transform: translateY(0); }
    .icon-bars span:nth-child(3){ transform: translateY(8px); }

    /* Morph to X (no opacity property used) */
    body.menu-open .icon-bars span:nth-child(1){ transform: rotate(45deg); }
    body.menu-open .icon-bars span:nth-child(2){ transform: scaleX(0); }
    body.menu-open .icon-bars span:nth-child(3){ transform: rotate(-45deg); }

    /* Full-screen mobile menu overlay
       - Covers whole screen
       - Grid: header row + remaining space row
       - 1s fade-in */
    .menu-overlay{
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: url('../assets/images/backgrounds/tec-website-bg-cure-footer.jpg') center top / cover no-repeat;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1000ms ease;

      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }
    body.menu-open .menu-overlay{
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    /* Overlay header (transparent so it doesn't look like a bar) */
    .menu-header{
      height: var(--header-h);
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--pad);
    }

    /* Center links + icons in the space UNDER the header row */
    .menu-inner{
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 34px;
      padding: var(--pad);
      text-align: center;
    }

    .menu-links{
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .menu-links a{
      color: #fff;
      text-decoration: none;
      font-family: 'balboa-plus-fill', sans-serif;
      font-size: clamp(39px, 8vw, 72px);
      text-transform: uppercase;
    }
    .menu-links a:hover{ color: var(--fuschia); text-decoration: none; }

    .menu-social{
      display: flex;
      gap: 22px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }
    .menu-social a{
      color: #fff;
      font-size: 27px;
      text-decoration: none;
    }
    .menu-social a:hover{ color: var(--fuschia); text-decoration: none; }

    /* Responsive rules */
    @media (max-width: 860px){
      header{ justify-content: space-between; }
      .nav-desktop{ display: none; }
      header > .header-socials{ display: none; }
      .menu-btn{ display: inline-grid; place-items: center; }
      .bullet-separator{ display: none; }
      .mobile-break{ display: block; }
      main{ padding: 2rem; }
    }

    /* Prevent background scroll when menu is open */
    body.menu-open{
      overflow: hidden;
    }

    /* Demo labels */
    .label{
      font-size: clamp(24px, 4vw, 56px);
      user-select: none;
    }
  </style>

  <script>
    const body = document.body;
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('mobileMenu');

    function setOpen(isOpen) {
      body.classList.toggle('menu-open', isOpen);
      menuBtn.setAttribute('aria-expanded', String(isOpen));
      menuBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
    }

    menuBtn.addEventListener('click', () => setOpen(true));
    closeBtn.addEventListener('click', () => setOpen(false));

    // Close on link click
    overlay.addEventListener('click', (e) => {
      const link = e.target.closest('[data-close]');
      if (link) setOpen(false);
    });

    // Lightbox functionality
    function openLightbox(imageSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imageSrc;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Close lightbox with Escape key
    document.addEventListener('keydown', function(event) {
      const lightbox = document.getElementById('lightbox');
      if (event.key === 'Escape' && lightbox && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });

    // Optional: click outside the menu-inner closes (clicking overlay background)
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) setOpen(false);
    });

    // Escape closes
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && body.classList.contains('menu-open')) setOpen(false);
    });

    // Auto-close if resizing up to desktop
    window.addEventListener('resize', () => {
      if (window.matchMedia('(min-width: 861px)').matches) setOpen(false);
    });

    // Dynamic footer year
    document.getElementById('footerYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
