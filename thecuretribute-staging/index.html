    <style>
        /* Reset */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }

        :root {
            --header-h: 84px;
            --footer-h: 84px;
            --pad: clamp(16px, 2.5vw, 28px);
            --fuschia: #c70864;
            --purple: #800080;
        }

        /* Page layout - full screen home page */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            height: var(--header-h);
            background: #111 url('../assets/images/backgrounds/tec-website-bg-cure.jpg') no-repeat center center / cover;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 0 var(--pad);
            position: relative;
            z-index: 100;
        }

        .logo-cure {
            height: 40px;
            width: auto;
            display: none;
        }

        @media (max-width: 1000px) {
            .logo-cure {
                display: block;
            }
        }

        a:hover .logo-cure {
            content: url('../assets/images/logos/tec-cure-logo-hover.svg');
        }

        .header-socials {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .header-socials a {
            color: #fff;
            font-size: 18px;
            text-decoration: none;
        }

        .header-socials a:hover {
            color: var(--fuschia);
        }

        /* Main content - two column layout */
        .cure-middle {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        .cure-middle-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
        }

        .cure-animated-logo {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 0 0 0 2rem;
        }

        .cure-animated-logo img {
            max-width: 100%;
            height: auto;
            max-height: 80vh;
        }

        .cure-middle-photo {
            flex: 0 0 60%;
            background-image: url('../assets/images/photos/cure/band/tec-website-photo-cure1.jpg');
            background-repeat: no-repeat;
            background-position: center 20%;
            background-size: cover;
            position: relative;
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.3) 10%, rgba(0, 0, 0, 0) 20%), linear-gradient(to bottom, rgba(0, 0, 0, 0) 80%, rgba(0, 0, 0, 0.3) 90%, #000000 100%);
        }

        /* Desktop nav */
        .nav-desktop {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-desktop a {
            color: #fff;
            text-decoration: none;
            font-family: 'balboa-plus-fill', sans-serif;
            font-size: 19px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-desktop a:hover {
            color: var(--fuschia);
        }

        /* Hamburger / X button */
        .menu-btn {
            width: 56px;
            height: 56px;
            display: none;
            border: 0;
            background: transparent;
            color: #fff;
            cursor: pointer;
            position: relative;
            padding: 0;
        }

        .menu-btn:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 4px;
        }

        .icon-bars {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
        }

        .icon-bars span {
            display: block;
            width: 24px;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: transform 220ms ease;
            position: absolute;
            transform-origin: center;
        }

        .icon-bars span:nth-child(1) {
            transform: translateY(-8px);
        }

        .icon-bars span:nth-child(2) {
            transform: translateY(0);
        }

        .icon-bars span:nth-child(3) {
            transform: translateY(8px);
        }

        /* Morph to X */
        body.menu-open .icon-bars span:nth-child(1) {
            transform: rotate(45deg);
        }

        body.menu-open .icon-bars span:nth-child(2) {
            transform: scaleX(0);
        }

        body.menu-open .icon-bars span:nth-child(3) {
            transform: rotate(-45deg);
        }

        /* Full-screen mobile menu overlay */
        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: url('../assets/images/backgrounds/tec-website-bg-cure-footer.jpg') center top / cover no-repeat;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 1000ms ease;
            display: grid;
            grid-template-rows: var(--header-h) 1fr;
        }

        body.menu-open .menu-overlay {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .menu-header {
            height: var(--header-h);
            background: transparent;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--pad);
        }

        .menu-inner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 34px;
            padding: var(--pad);
            text-align: center;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .menu-links a {
            color: #fff;
            text-decoration: none;
            font-family: 'balboa-plus-fill', sans-serif;
            font-size: clamp(39px, 8vw, 72px);
            text-transform: uppercase;
        }

        .menu-links a:hover {
            color: var(--fuschia);
        }

        .menu-social {
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: center;
            margin-top: 12px;
        }

        .menu-social a {
            color: #fff;
            font-size: 27px;
            text-decoration: none;
        }

        .menu-social a:hover {
            color: var(--fuschia);
        }

        /* Footer */
        footer {
            background: #111 url('../assets/images/backgrounds/tec-website-bg-cure.jpg') no-repeat center center / cover;
            color: #fff;
            font-family: 'Futura', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem 2rem;
            gap: 0.25rem;
        }

        .footer-links {
            font-size: 11.52px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .footer-links a {
            color: #fff;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: var(--fuschia);
        }

        .bullet-separator {
            margin: 0 8px;
        }

        .footer-copyright {
            font-size: 11.52px;
            margin: 0;
            color: #bbb;
        }

        .mobile-break {
            display: none;
        }

        /* Responsive rules */
        @media (max-width: 1000px) {
            body {
                height: 100vh;
                max-height: 100vh;
                overflow: hidden;
            }

            .cure-middle {
                flex: 1;
                display: flex;
                flex-direction: column;
                position: relative;
                min-height: 0;
            }

            .cure-middle-content {
                flex: 1;
                display: flex;
                flex-direction: column;
                position: relative;
                min-height: 0;
            }

            .cure-middle-photo {
                flex: 1;
                min-height: 0;
                background-position: center 35%;
                background-size: cover;
                position: relative;
            }

            .cure-animated-logo {
                display: none;
            }

            .gradient-overlay {
                background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.7) 85%, #000000 100%);
            }
        }

        @media (max-width: 860px) {
            header {
                justify-content: space-between;
            }

            .nav-desktop {
                display: none;
            }

            header > .header-socials {
                display: none;
            }

            .menu-btn {
                display: inline-grid;
                place-items: center;
            }

            .mobile-break {
                display: block;
            }
        }

        @media (max-width: 600px) {
            .bullet-separator {
                display: none;
            }
        }

        @media (max-width: 1000px) {
            footer {
                flex-shrink: 0;
                background: #111 url('../assets/images/backgrounds/tec-website-bg-cure.jpg') no-repeat center center / cover;
                padding: 1.5rem 2rem;
                gap: 0.25rem;
            }

            .footer-links {
                font-size: 11.52px;
                line-height: 1.6;
            }

            .footer-copyright {
                font-size: 11.52px;
            }
        }

        /* Prevent background scroll when menu is open */
        body.menu-open {
            overflow: hidden;
        }
    </style>
</head>

<body>
    <!-- Normal site header -->
    <header>
        <a href="index.html"><img src="../assets/images/logos/tec-cure-logo.svg" alt="The Cure Tribute Band" class="logo-cure"></a>

        <nav class="nav-desktop" aria-label="Primary">
            <a href="about.html">About</a>
            <a href="shows.html">Shows</a>
            <a href="videos.html">Videos</a>
            <a href="photos.html">Photos</a>
            <a href="contact.html">Contact</a>
        </nav>

        <div class="header-socials">
            <a href="https://www.instagram.com/theenglishchannels/" aria-label="Instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.facebook.com/theenglishchannelscovers/" aria-label="Facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="https://x.com/englishchannels" aria-label="X (Twitter)" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        </div>

        <button class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
            <span class="icon-bars" aria-hidden="true">
                <span></span><span></span><span></span>
            </span>
        </button>
    </header>

    <!-- Full-screen mobile menu overlay -->
    <div class="menu-overlay" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Mobile menu">
        <div class="menu-header">
            <a href="index.html"><img src="../assets/images/logos/tec-cure-logo.svg" alt="The Cure Tribute Band" class="logo-cure"></a>

            <button class="menu-btn" id="closeBtn" aria-label="Close menu">
                <span class="icon-bars" aria-hidden="true">
                    <span></span><span></span><span></span>
                </span>
            </button>
        </div>

        <div class="menu-inner">
            <div class="menu-links">
                <a href="about.html" data-close>About</a>
                <a href="shows.html" data-close>Shows</a>
                <a href="videos.html" data-close>Videos</a>
                <a href="photos.html" data-close>Photos</a>
                <a href="contact.html" data-close>Contact</a>
            </div>

            <div class="menu-social" aria-label="Social links">
                <a href="https://www.instagram.com/theenglishchannels/" aria-label="Instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://www.facebook.com/theenglishchannelscovers/" aria-label="Facebook" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://x.com/englishchannels" aria-label="X (Twitter)" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
    </div>

    <main class="cure-middle">
        <div class="cure-middle-content">
            <div class="cure-animated-logo">
                <img src="../assets/images/logos/tec-cure-logo-animated.gif" alt="The Cure Tribute Band Animated Logo">
            </div>
            <div class="cure-middle-photo">
                <div class="gradient-overlay"></div>
            </div>
        </div>
    </main>

    <footer>
        <p class="footer-links"><a href="https://theenglishchannels.com">theenglishchannels.com</a> <span class="bullet-separator">•</span> <a href="mailto:booking@theenglishchannels.com">booking@theenglishchannels.com</a></p>
        <p class="footer-copyright">© <span id="footerYear"></span> The English Channels - The Cure Tribute. <span class="mobile-break"></span>All rights reserved.</p>
    </footer>

    <script>
        const body = document.body;
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const overlay = document.getElementById('mobileMenu');

        function setOpen(isOpen) {
            if (isOpen) {
                body.classList.add('menu-open');
                menuBtn.setAttribute('aria-expanded', 'true');
            } else {
                body.classList.remove('menu-open');
                menuBtn.setAttribute('aria-expanded', 'false');
            }
        }

        menuBtn.addEventListener('click', () => setOpen(true));
        closeBtn.addEventListener('click', () => setOpen(false));

        // Close on link click
        overlay.addEventListener('click', (e) => {
            const link = e.target.closest('[data-close]');
            if (link) setOpen(false);
        });

        // Optional: click outside the menu-inner closes
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) setOpen(false);
        });

        // Escape closes
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && body.classList.contains('menu-open')) setOpen(false);
        });

        // Update footer year
        document.getElementById('footerYear').textContent = new Date().getFullYear();
    </script>
</body>

</html>
