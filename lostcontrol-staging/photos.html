  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; }
    html { min-height: 100%; }
    body { margin: 0; font-family: 'Futura', 'Futura PT', Arial, sans-serif; }

    :root{
      --header-h: 84px;
      --footer-h: 84px;
      --pad: clamp(16px, 2.5vw, 28px);
      --pink: #ff7fcf;
      --dark-pink: #b11f59;
    }

    /* Page layout */
    body{
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header{
      height: var(--header-h);
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 var(--pad);
    }

    .logo-ylc{
      height: 40px;
      width: auto;
      display: block;
    }
    a:hover .logo-ylc{
      content: url('../assets/images/logos/tec-website-logo-ylc-ro.svg');
    }

    .header-socials{
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .header-socials a{
      color: #fff;
      font-size: 18px;
      text-decoration: none;
    }
    .header-socials a:hover{ color: var(--pink); }

    main{
      flex: 1;
      background: #2f0b37;
      color: #fff;
      padding: var(--pad);
    }

    /* Section */
    .section{
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 0;
    }

    .section h1{
      font-family: "grand-central", serif;
      font-weight: 700;
      font-size: 56px;
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 32px;
    }

    /* Gallery */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      aspect-ratio: 1 / 1;
    }

    .gallery-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      padding: 2rem;
      cursor: pointer;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }

    .close-btn {
      position: absolute;
      top: 2rem;
      right: 2rem;
      color: white;
      font-size: 3rem;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 10000;
      line-height: 1;
      padding: 0 1rem;
    }

    .close-btn:hover {
      color: var(--pink);
    }

    @media (max-width: 768px){
      .section h1{
        font-size: 40px;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;

      .close-btn {
        font-size: 2.5rem;
        top: 1rem;
        right: 1rem;
      }

    /* Hamburger / X button */
    .menu-btn{
      width: 56px;
      height: 56px;
      display: none;
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      position: relative;
      padding: 0;
    }
    .menu-btn:focus-visible{
      outline: 2px solid #fff;
      outline-offset: 4px;
    }

    .icon-bars{
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }
    .icon-bars span{
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 220ms ease;
      position: absolute;
      transform-origin: center;
    }
    .icon-bars span:nth-child(1){ transform: translateY(-8px); }
    .icon-bars span:nth-child(2){ transform: translateY(0); }
    .icon-bars span:nth-child(3){ transform: translateY(8px); }

    /* Morph to X */
    body.menu-open .icon-bars span:nth-child(1){ transform: rotate(45deg); }
    body.menu-open .icon-bars span:nth-child(2){ transform: scaleX(0); }
    body.menu-open .icon-bars span:nth-child(3){ transform: rotate(-45deg); }

    /* Full-screen mobile menu overlay */
    .menu-overlay{
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 1000ms ease;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }
    body.menu-open .menu-overlay{
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .menu-header{
      height: var(--header-h);
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--pad);
    }

    .menu-inner{

      flex-direction: column;
      justify-content: center;
      align-items: center;

      padding: var(--pad);

    .menu-links{

      color: #fff;
      text-decoration: none;
      font-family: 'Futura', 'Futura PT', Arial, sans-serif;

      text-transform: uppercase;

    }
    .menu-links a:hover{ color: var(--pink); text-decoration: none; }

    .menu-social{

    .menu-social a:hover{ color: var(--pink); text-decoration: none; }

    /* Responsive rules */
    @media (max-width: 860px){
      header{ justify-content: space-between; }
      .nav-desktop{ display: none; }
      header > .header-socials{ display: none; }
      .menu-btn{ display: inline-grid; place-items: center; }
      main{ padding: 2rem; }
    }

    @media (max-width: 600px){
      .bullet-separator{ display: none; }
      main{ padding: 1rem; }
    }

    /* Prevent background scroll when menu is open */
    body.menu-open{
      overflow: hidden;
    }
  </style>

  <script>
    const body = document.body;
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('mobileMenu');

    function setOpen(isOpen) {
      body.classList.toggle('menu-open', isOpen);
      menuBtn.setAttribute('aria-expanded', String(isOpen));
      menuBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
    }

    menuBtn.addEventListener('click', () => setOpen(true));
    closeBtn.addEventListener('click', () => setOpen(false));

    // Close on link click
    overlay.addEventListener('click', (e) => {
      const link = e.target.closest('[data-close]');
      if (link) setOpen(false);
    });

    // Lightbox functionality
    function openLightbox(imageSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imageSrc;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    // Close lightbox with Escape key
    document.addEventListener('keydown', function(event) {
      const lightbox = document.getElementById('lightbox');
      if (event.key === 'Escape' && lightbox && lightbox.classList.contains('active')) {
        closeLightbox();
      }
    });

    // Click outside menu-inner closes
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) setOpen(false);
    });

    // Escape closes menu
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && body.classList.contains('menu-open')) setOpen(false);
    });

    // Auto-close if resizing up to desktop
    window.addEventListener('resize', () => {
      if (window.matchMedia('(min-width: 861px)').matches) setOpen(false);
    });

  </script>
